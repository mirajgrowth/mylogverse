<!DOCTYPE html>
<html>
<head>
  <title>MyLogVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #001a33, black);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://i.ibb.co/9yK0q2K/stars.png');
      animation: moveStars 60s linear infinite;
      z-index: -1;
    }

    @keyframes moveStars {
      from {background-position: 0 0;}
      to {background-position: 1000px 1000px;}
    }

    h1 {
      margin-top: 20px;
      font-size: 35px;
      color: gold;
    }

    .moon {
      font-size: 60px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
    }

    .card {
      margin: 15px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }

    .time {
      font-size: 18px;
      margin: 5px;
    }

    #countdown {
      font-size: 20px;
      color: gold;
    }

    label {
      display: block;
      margin: 5px;
    }

  </style>
</head>

<body>

<div class="stars"></div>

<div class="moon">🌙</div>
<h1>🕌 MyLogVerse</h1>
<p>Ramadan Prayer Tracker</p>

<div class="card" id="times">Loading...</div>

<div class="card">
  <h3>✅ Track Salah</h3>
  <label><input type="checkbox"> Fajr</label>
  <label><input type="checkbox"> Zuhr</label>
  <label><input type="checkbox"> Asr</label>
  <label><input type="checkbox"> Maghrib</label>
  <label><input type="checkbox"> Isha</label>
</div>

<div class="card">
  <h3>⏳ Next Prayer</h3>
  <p id="countdown">Loading...</p>
</div>

<script>
fetch("https://api.aladhan.com/v1/timingsByCity?city=Barishal&country=Bangladesh")
.then(res => res.json())
.then(data => {
  let t = data.data.timings;

  document.getElementById("times").innerHTML = `
    <div class="time">Fajr: ${t.Fajr}</div>
    <div class="time">Zuhr: ${t.Dhuhr}</div>
    <div class="time">Asr: ${t.Asr}</div>
    <div class="time">Maghrib: ${t.Maghrib}</div>
    <div class="time">Isha: ${t.Isha}</div>
  `;

  let prayers = [
    {name:"Fajr", time:t.Fajr},
    {name:"Zuhr", time:t.Dhuhr},
    {name:"Asr", time:t.Asr},
    {name:"Maghrib", time:t.Maghrib},
    {name:"Isha", time:t.Isha}
  ];

  function getNextPrayer() {
    let now = new Date();
    for (let p of prayers) {
      let [h,m] = p.time.split(":");
      let pt = new Date();
      pt.setHours(h, m, 0);

      if (pt > now) return {name:p.name, time:pt};
    }
    return null;
  }

  function updateCountdown() {
    let next = getNextPrayer();
    if (!next) return;

    let now = new Date();
    let diff = next.time - now;

    let h = Math.floor(diff/1000/60/60);
    let m = Math.floor((diff/1000/60)%60);
    let s = Math.floor((diff/1000)%60);

    document.getElementById("countdown").innerText =
      next.name + " in " + h + "h " + m + "m " + s + "s";
  }

  setInterval(updateCountdown,1000);
});

document.querySelectorAll("input").forEach((box, i) => {
  box.checked = localStorage.getItem("p"+i) === "true";
  box.addEventListener("change", () => {
    localStorage.setItem("p"+i, box.checked);
  });
});
</script>

</body>
</html>
